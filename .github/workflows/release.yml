name: Release Kaiwu

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  # ============================================================
  # Build kaiwu CLI (Go binary) — ~30s
  # ============================================================
  build-kaiwu:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
          - os: windows-2022
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build kaiwu
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o kaiwu${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/kaiwu/

      - name: Upload kaiwu binary
        uses: actions/upload-artifact@v4
        with:
          name: kaiwu-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kaiwu${{ matrix.goos == 'windows' && '.exe' || '' }}

  # ============================================================
  # Package everything and create GitHub Release
  # Downloads pre-built llama-server from build-llama-server.yml
  # ============================================================
  release:
    needs: [build-kaiwu]
    runs-on: ubuntu-22.04

    steps:
      - name: Download kaiwu artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Download pre-built llama-server from build-llama-server.yml workflow
      - name: Download llama-server (Windows)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-llama-server.yml
          name: llama-server-turboquant-win-cuda-12.4
          path: artifacts/llama-server-windows

      - name: Download llama-server (Linux)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-llama-server.yml
          name: llama-server-turboquant-linux-cuda-12.4
          path: artifacts/llama-server-linux

      - name: Package Windows release
        run: |
          mkdir -p package-win
          cp artifacts/kaiwu-windows-amd64/kaiwu.exe package-win/
          cp artifacts/llama-server-windows/* package-win/
          # Create turboquant marker for static iso3 detection
          echo "turboquant-iso3" > package-win/llama-server-cuda.exe.kaiwu
          cd package-win && zip -r ../kaiwu-windows-amd64.zip . && cd ..

      - name: Package Linux release
        run: |
          mkdir -p package-linux
          cp artifacts/kaiwu-linux-amd64/kaiwu package-linux/
          cp artifacts/llama-server-linux/* package-linux/
          # Create turboquant marker for static iso3 detection
          echo "turboquant-iso3" > package-linux/llama-server-cuda.kaiwu
          chmod +x package-linux/kaiwu package-linux/llama-server-cuda
          cd package-linux && tar -czf ../kaiwu-linux-amd64.tar.gz . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kaiwu-windows-amd64.zip
            kaiwu-linux-amd64.tar.gz
